write_quiz:
  description: >
    Subtopic: "{subtopic}"
    Reading materials: {reading_materials}

    Full text of the assigned reading materials (use as your primary grounding
    source — base every question on these passages, but never paste them
    verbatim or mention these documents inline):
    ===== READING MATERIALS BEGIN =====
    {reading_materials_content}
    ===== READING MATERIALS END =====

    Create exactly 5 MCQ questions based solely on the content of the reading
    materials above, scoped to the subtopic.

    Output a single JSON object (no markdown, no preamble, no commentary)
    with key "all_questions" mapping to an array of 5 objects, each with:
      - "question"           (string)
      - "options"            (array of exactly 4 strings, all distinct)
      - "correct_option_id"  (integer 0-3, index of correct answer)
      - "Correct_answer_explanation" (2-3 sentences that reference the specific
        concept or principle from the source — not generic film knowledge)

    Rules:
    - Across the 5 questions, mix types: at least 1 conceptual (definition or
      principle), at least 2 application (apply a concept to a film, scene, or
      scenario), at least 1 analytical (compare, contrast, or distinguish), and
      at least 1 recall (a specific fact, term, or technique from the source).
      Do not make all 5 the same type.
    - The 5 questions must collectively cover at least 3 distinct sections,
      ideas, or chapters from the reading materials. Do not cluster every
      question around the same concept.
    - Every wrong option must be plausible — a real concept the student could
      realistically confuse with the correct answer. Distractors should come
      from related ideas in the same source material when possible. Never use
      absurd, off-topic, or trivially-wrong options. A well-prepared student
      should pause before choosing the right answer.
    - Each question's correct_option_id must vary across the 5 — do not put
      the right answer at the same index every time. Aim for a roughly random
      distribution.
    - All 4 options per question must be distinct strings.
    - Never mention file extensions, source citations like "【…†source】",
      reading material file names, or URLs in question/answer text.
    - Never include emojis, jokes, casual tone, or AI references.
    - Strictly output JSON. The first character of the response must be `{{`
      and the last must be `}}`.

    Example shape:

    {{
      "all_questions": [
        {{
          "question": "What is the primary purpose of color grading in film post-production?",
          "options": [
            "To correct audio levels",
            "To enhance the visual tone and mood of the film",
            "To edit the script for continuity",
            "To adjust the film's running time"
          ],
          "correct_option_id": 1,
          "Correct_answer_explanation": "Color grading shapes the visual tone and emotional mood of a film by adjusting hues, saturation, and contrast across shots."
        }}
      ]
    }}
  expected_output: >
    A single valid JSON object with the key "all_questions" containing 5 MCQ
    objects in the schema above. No markdown fences, no commentary, no extra
    keys at the top level.
